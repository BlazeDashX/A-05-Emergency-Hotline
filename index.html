<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency - Hotline</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Madurai:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#F5FFF6] max-w-[1920px] font-[Hind_Madurai]">
<section class="Nav bg-white md:h-[100px] w-full flex flex-col md:flex-row items-center justify-between px-6 md:px-15 py-5 mdd:py-0">
  
  <!-- LEFT -->
  <div class="left-nav flex flex-col md:flex-row  items-center gap-3">
    <img class="w-[50px] h-[50px]" src="./assets/logo.png" alt="logo" />
    <h1 class="font-extrabold text-[#013223] leading-tight text-[16px]">
      Emergency <br class=" hidden md:block"/>Service
    </h1>
  </div>

  <!-- RIGHT -->
  <div class="right-nav h-[52px] flex items-center gap-5 text-[#013223] font-semibold mt-5 md-mt-0">

    <div class="heart w-[120px] h-full flex justify-center items-center gap-2 bg-[#EDFFF1] rounded-4xl">
      <p>0</p>
      <img class="w-6 h-6" src="./assets/heart.png" alt="heart" />
    </div>

    <div class="coin w-[120px] h-full flex justify-center items-center gap-2 bg-[#EDFFF1] rounded-4xl">
      <p>100</p>
      <img class="w-6 h-6" src="./assets/coin.png" alt="coin" />
    </div>

    <div class="copy w-[120px] h-full flex justify-center items-center gap-2 bg-[#00A63E] text-white rounded-4xl text-sm">
      <p><span>0</span> Copy</p>
    </div>

  </div>
</section>
    <section class="Hero h-[239px] bg-[#013223]"></section>
    <section class="content"></section>
  </body>
</html>
